<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci a Senha | Facilita</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <script src="../js/config.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="../index.html" class="auth-logo">
          <div class="logo-icon" style="width: 32px; height: 32px; border-radius: 8px;">
            <i data-lucide="zap"></i>
          </div>
          Facilita
        </a>
        <h2>Recuperação de Senha</h2>
        <p>Digite seu e-mail para receber um link de redefinição.</p>
      </div>
      
      <form id="forgot-form">
        <div class="auth-form-group">
          <label class="auth-label" for="email">E-mail</label>
          <div class="auth-input-wrapper">
            <input type="email" id="email" class="auth-input" placeholder="seu@email.com" required>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary auth-btn-submit" id="forgot-btn">Enviar link de recuperação</button>
      </form>
      
      <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary);">
        Lembrou da senha? <a href="login.html" style="color: var(--primary-blue); font-weight: 600;">Faça login</a>
      </p>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
    
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('forgot-btn');
      const email = document.getElementById('email').value;
      
      btn.innerHTML = '<div class="loading-spinner" style="width: 20px; height: 20px;"></div>';
      btn.disabled = true;
      
      try {
        const response = await fetch(`${API_BASE_URL}/api/v1/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          alert('Se o e-mail estiver cadastrado, você receberá um link de recuperação em breve. Verifique sua caixa de entrada e Spam.');
          window.location.href = 'login.html';
        } else {
          alert(data.detail || 'Erro ao tentar enviar o e-mail.');
        }
      } catch (err) {
        alert('Erro de conexão. Tente novamente.');
      } finally {
        btn.innerHTML = 'Enviar link de recuperação';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
