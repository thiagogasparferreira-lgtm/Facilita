<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Facilita</title>
  <meta name="description" content="Crie sua conta grátis no Facilita e acesse mais de 12 ferramentas online.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="manifest" href="../manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <script src="../js/config.js"></script>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="../index.html" class="auth-logo">
          <div class="logo-icon" style="width: 32px; height: 32px; border-radius: 8px;">
            <i data-lucide="zap"></i>
          </div>
          Facilita
        </a>
        <h2>Crie sua conta</h2>
        <p>Comece a facilitar seu dia agora</p>
      </div>
      
      <form id="register-form">
        <div class="auth-form-group">
          <label class="auth-label" for="name">Nome completo</label>
          <div class="auth-input-wrapper">
            <input type="text" id="name" class="auth-input" placeholder="Seu nome" required>
          </div>
        </div>
        
        <div class="auth-form-group">
          <label class="auth-label" for="email">Email</label>
          <div class="auth-input-wrapper">
            <input type="email" id="email" class="auth-input" placeholder="seu@email.com" required>
          </div>
        </div>
        
        <div class="auth-form-group">
          <label class="auth-label" for="password">Senha</label>
          <div class="auth-input-wrapper">
            <input type="password" id="password" class="auth-input" placeholder="Crie uma senha segura" required>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary auth-btn-submit">Criar conta gratuitamente</button>
      </form>
      
      <div class="auth-divider">OU CONTINUAR COM</div>
      
      <button class="auth-btn-google">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google">
        Google
      </button>
      
      <div class="auth-footer">
        Já tem uma conta? <a href="login.html">Fazer login</a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../js/auth.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
