<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Facilita</title>
  <meta name="description" content="Crie sua conta grátis no Facilita e acesse mais de 12 ferramentas online.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="manifest" href="../manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <script src="../js/config.js"></script>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="../index.html" class="auth-logo">
          <div class="logo-icon" style="width: 32px; height: 32px; border-radius: 8px;">
            <i data-lucide="zap"></i>
          </div>
          Facilita
        </a>
        <h2>Crie sua conta</h2>
        <p>Comece a facilitar seu dia agora</p>
      </div>
      
      <form id="register-form">
        <div class="auth-form-group">
          <label class="auth-label" for="name">Nome completo</label>
          <div class="auth-input-wrapper">
            <input type="text" id="name" class="auth-input" placeholder="Seu nome" required>
          </div>
        </div>
        
        <div class="auth-form-group">
          <label class="auth-label" for="email">Email</label>
          <div class="auth-input-wrapper">
            <input type="email" id="email" class="auth-input" placeholder="seu@email.com" required>
          </div>
        </div>
        
        <div class="auth-form-group">
          <label class="auth-label" for="password">Senha</label>
          <div class="auth-input-wrapper">
            <input type="password" id="password" class="auth-input" placeholder="Crie uma senha segura" required>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary auth-btn-submit">Criar conta gratuitamente</button>
      </form>
      
      <div class="auth-divider">OU CONTINUAR COM</div>
      
      <!-- Google Identity Services -->
      <div id="google-btn-container" style="display: flex; justify-content: center; width: 100%;"></div>

      <div class="auth-footer" style="margin-top: 20px; text-align: center; font-size: 14px;">
        Já tem uma conta? <a href="login.html" style="color: var(--primary-blue); font-weight: 600;">Entrar</a>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../js/auth.js"></script>
  
  <script>
    lucide.createIcons();
    
    window.onload = function () {
      google.accounts.id.initialize({
        client_id: "209055711301-qga9m15q53khrtrtmtd6ql8pis0861b7.apps.googleusercontent.com",
        callback: handleGoogleLogin,
        auto_select: false,
        itp_support: true,
        cancel_on_tap_outside: true
      });
      google.accounts.id.renderButton(
        document.getElementById("google-btn-container"),
        { theme: "filled_black", size: "large", type: "standard", shape: "rectangular", width: 350, text: "signup_with" }
      );
    }
    
    async function handleGoogleLogin(response) {
      try {
        const res = await fetch(`${API_BASE_URL}/api/v1/auth/google-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            credential: response.credential,
            client_id: "209055711301-qga9m15q53khrtrtmtd6ql8pis0861b7.apps.googleusercontent.com"
          })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          localStorage.setItem('facilita_user', JSON.stringify({
            token: data.access_token,
            email: data.user.email,
            name: data.user.name,
            is_pro: data.user.is_pro,
            is_admin: data.user.is_admin,
            avatar: data.user.avatar_url
          }));
          window.location.href = '../dashboard/index.html';
        } else {
          alert(data.detail || 'Falha no cadastro com Google.');
        }
      } catch (err) {
        console.error(err);
        alert('Erro de conexão ao tentar fazer cadastro com Google.');
      }
    }
  </script>
</body>
</html>
